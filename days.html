<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дней в отношениях</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(to bottom right, #ffafbd, #ffc3a0);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0 20px;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            color: #e91e63;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-family: 'Cursive', sans-serif;
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        .result {
            font-size: 1.2em;
            margin-top: 15px;
            line-height: 1.5;
        }
        .result p {
            margin: 0;
        }
        .heart {
            font-size: 4em;
            color: #e91e63;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">❤️</div>
        <h1>Дней в отношениях</h1>
        <div class="result" id="result"></div>
    </div>
    <script>
        function calculateDays() {
            const startDate = new Date(2023, 10, 11); // 11 ноября 2023
            const today = new Date();
            const diffTime = Math.abs(today - startDate);

            // Расчет дней
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            // Расчет лет, месяцев и дней
            let years = today.getFullYear() - startDate.getFullYear();
            let months = today.getMonth() - startDate.getMonth();
            let days = today.getDate() - startDate.getDate();

            if (days < 0) {
                months -= 1;
                const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += prevMonth.getDate();
            }

            if (months < 0) {
                years -= 1;
                months += 12;
            }

            // Отображение результата
            const resultElement = document.getElementById("result");
            resultElement.innerHTML = `
                <p><strong>${years}</strong> лет, <strong>${months}</strong> месяцев и <strong>${days}</strong> дней</p>
                <p>Всего дней: <strong>${diffDays}</strong></p>
            `;
        }

        calculateDays();
    </script>
</body>
</html>
